<!DOCTYPE html>
<html>
<head>
  <title>Home - Event Management</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Menu</h2>
    <a href="index.html">Home</a>
    <a href="#">Event History</a>
    <a href="#">Create Event</a>
    <a href="#" onclick="goProfile()">Profile</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Search Bar -->
    <div class="topbar">
      <input type="text" placeholder="Search events...">
    </div>

    <!-- Events -->
    <h1>Upcoming Events</h1>
    <div class="cards" id="eventsContainer"></div>

  </div>
</div>

<!-- ✅ SINGLE CLEAN POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span id="closeBtn">&times;</span>

    <h2 id="eventTitle"></h2>
    <p id="eventSummary"></p>

    <ul id="eventCriteria"></ul>

    <button id="registerBtn">Register</button>
  </div>
</div>

<!-- ✅ ONLY ONE SCRIPT -->
<script src="js/home.js"></script>

</body>
</html>
