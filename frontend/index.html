<!DOCTYPE html>
<html>
<head>
  <title>Home - Event Management</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="container">

  <!-- Sidebar -->
  <div class="sidebar">
    <h2>Menu</h2>
    <a href="index.html">Home</a>
    <a href="events.html">Event History</a>
    <a href="create.html">Create Event</a>
    <a href="#" onclick="goProfile()"> Profile</a>
    <a href="#" onclick="logout()">Logout</a>
  </div>

  <!-- Main Content -->
  <div class="main">

    <!-- Search Bar -->
    <div class="topbar">
      <input type="text" placeholder="Search events...">
    </div>

    <!-- Static Event Cards -->
    <h1>Upcoming Events</h1>

    <div class="cards">

      <div class="card">
        <h3>Technical Workshop</h3>
        <p>Time: 10:00 AM</p>
        <button onclick="openPopup('technical')">View</button>
      </div>

      <div class="card">
        <h3>Hackathon</h3>
        <p>Time: 2:00 PM</p>
        <button onclick="openPopup('hackathon')">View</button>
      </div>

      <div class="card">
        <h3>Coding Contest</h3>
        <p>Time: 5:00 PM</p>
        <button onclick="openPopup('coding')">View</button>
      </div>

    </div>

    <!-- ✅ NEW: Dynamic Events from Database -->
    <h2>Events from Database</h2>
    <ul id="eventsList"></ul>

  </div>

</div>

<!-- 🔥 UPDATED POPUP -->
<div id="popup" class="popup">
  <div class="popup-content">
    <span id="closeBtn">&times;</span>

    <h2 id="eventTitle"></h2>
    <p id="eventSummary"></p>

    <h4>Eligibility:</h4>
    <ul id="eventCriteria"></ul>

    <button onclick="registerEvent()">Register</button>
  </div>
</div>

<script src="js/home.js"></script>

</body>
</html>
