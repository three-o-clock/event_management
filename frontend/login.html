<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | EventSphere</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
<div class="auth-container">

    <p class="brand"><span class="brand-dot"></span>EventSphere</p>
    <p class="auth-subtitle">Sign in to your account</p>

    <div class="error-msg" id="error-msg"></div>

    <form onsubmit="loginUser(event)">
        <div class="form-group">
            <label>Email address</label>
            <input type="email" id="email" placeholder="you@college.edu" required />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary">Sign in</button>
    </form>

    <div class="divider"><span>or continue with</span></div>

    <div id="g_id_onload"
         data-client_id="626485936669-hnbe1btlvlsj3fb107m7ejtdae92fl8u.apps.googleusercontent.com"
         data-callback="handleGoogleLogin"
         data-auto_prompt="false">
    </div>
    <div class="g_id_signin"
         data-type="standard"
         data-size="large"
         data-theme="outline"
         data-text="sign_in_with"
         data-shape="rectangular"
         data-logo_alignment="left"
         data-width="380">
    </div>

    <p class="auth-footer">No account? <a href="register.html">Register here</a></p>
</div>
<script src="js/auth.js"></script>
</body>
</html>
