<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | EventSphere</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-container">

    <p class="brand"><span class="brand-dot"></span>EventSphere</p>
    <p class="auth-subtitle">Create your account</p>

    <div class="error-msg" id="error-msg"></div>

    <form onsubmit="registerUser(event)">
        <div class="form-group">
            <label>Full name</label>
            <input type="text" id="name" placeholder="" required />
        </div>
        <div class="form-group">
            <label>Email address</label>
            <input type="email" id="email" placeholder="you@college.edu" required />
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <div class="form-group">
            <label>Phone number</label>
            <input type="text" id="phone" placeholder="+91 " />
        </div>
        <div class="form-group">
            <label>Department</label>
            <input type="text" id="department" placeholder="" />
        </div>
        <div class="form-group">
            <label>Year</label>
            <input type="number" id="year" placeholder="2" min="1" max="5" />
        </div>
        <div class="form-group">
            <label>Role</label>
            <select id="role">
                <option value="student">Student</option>
                <option value="organizer">Organizer</option>
                <option value="admin">Admin</option>
            </select>
        </div>
        <button type="submit" class="btn-primary">Create account</button>
    </form>

    <p class="auth-footer">Already have an account? <a href="login.html">Sign in</a></p>
</div>
<script src="js/auth.js"></script>
</body>
</html>
